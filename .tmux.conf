# ──────────────────────────────────────────
# Prefix key  (remap Ctrl+b → Ctrl+a)
# ──────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix       # Ctrl+a twice sends it to the shell

# ──────────────────────────────────────────
# General settings
# ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true colour
set -g base-index 1              # windows start at 1, not 0
setw -g pane-base-index 1       # panes start at 1 too
set -g renumber-windows on      # re-number after a window closes
set -g escape-time 0            # no delay after Escape (vital for vim)
set -g history-limit 50000      # scrollback lines
set -g focus-events on          # pass focus to apps (vim etc.)
set -g mouse on                 # mouse scroll + click to switch pane

# ──────────────────────────────────────────
# Reload config with prefix + r
# ──────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ──────────────────────────────────────────
# Splits  (intuitive keys, same directory)
# ──────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"  # | for vertical split
bind - split-window -v -c "#{pane_current_path}"  # - for horizontal split
unbind '"'
unbind %

# ──────────────────────────────────────────
# Pane navigation  (vim hjkl)
# ──────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (-r makes them repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ──────────────────────────────────────────
# Copy mode  (vi keys)
# ──────────────────────────────────────────
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ──────────────────────────────────────────
# Status bar
# ──────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] '
set -g status-left-length 30
set -g status-right '#[fg=#a6e3a1] #(whoami)@#H #[fg=#f38ba8] %H:%M #[fg=#fab387] %d %b'
set -g status-right-length 60

setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bg=#89dceb,fg=#1e1e2e,bold] #I:#W '

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'
set -g message-style 'bg=#f38ba8,fg=#1e1e2e,bold'
